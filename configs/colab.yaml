runtime:
  environment: colab
  device: cuda
  # Tesla T4 has no native BF16 support.
  precision: fp16
model:
  provider: huggingface
  name: Qwen/Qwen2.5-7B-Instruct
  judge_name: Qwen/Qwen2.5-7B-Instruct
  judge_names:
    - Qwen/Qwen2.5-7B-Instruct
    - mistralai/Mistral-7B-Instruct-v0.3
    - microsoft/Phi-3.5-mini-instruct
  quantization: 4bit
  batch_size: 1
  max_new_tokens: 512
storage:
  # Results are written to Drive so an interrupted session can resume.
  backend: drive
  base_path: /content/drive/MyDrive/cot-enem/outputs
  persistent_path: /content/drive/MyDrive/cot-enem/outputs
  # Model weights are large and should use Colab's ephemeral local disk.
  cache_path: /content/hf-cache
pipeline:
  checkpoint_interval: 1
  resume: true
