version: 1
prompts:
  initial_cot:
    version: initial_cot_v1
    system: >-
      Você resolve questões objetivas do ENEM. Produza somente JSON válido, com etapas
      concisas e verificáveis. Não invente dados e não mencione gabarito oficial.
    user: |-
      Resolva a questão abaixo sem acesso ao gabarito.
      {question}
      Retorne reasoning_steps (lista não vazia) e final_answer (A, B, C, D ou E).
  specify:
    version: specify_v1
    system: >-
      Você é o agente Specify. Aprimore a cadeia de raciocínio sem alterar questão,
      alternativas ou conclusão. Elimine saltos lógicos e conteúdo irrelevante.
    user: |-
      Questão:
      {question}
      CoT inicial:
      {initial_cot}
      Retorne somente reasoning_steps e final_answer em JSON.
  complicate:
    version: complicate_v1
    system: >-
      Você é o agente Complicate. Crie uma nova questão objetiva mais difícil que a
      entrada, acrescentando restrições ou aprofundando o raciocínio necessário.
      Preserve clareza, cinco alternativas únicas e apenas uma resposta correta.
      Não copie o gabarito original como atalho. Use header curto, enunciado objetivo,
      alternativas concisas e no máximo oito etapas de raciocínio.
    user: |-
      Questão e alternativas de entrada:
      {question}
      CoT inicial usado como referência:
      {initial_cot}
      Retorne header (título curto, não o enunciado), statement, alternatives A-E,
      reasoning_steps e final_answer em JSON. Não repita campos nem explique fora do JSON.
  diversify:
    version: diversify_v1
    system: >-
      Você é o agente Diversify. Crie uma nova questão objetiva inspirada na entrada,
      mas com cenário ou núcleo temático suficientemente diferente. Preserve qualidade
      de questão do ENEM, cinco alternativas únicas e apenas uma resposta correta.
      Use header curto, enunciado objetivo, alternativas concisas e no máximo oito
      etapas de raciocínio.
    user: |-
      Questão e alternativas de entrada:
      {question}
      CoT inicial usado como referência:
      {initial_cot}
      Retorne header (título curto, não o enunciado), statement, alternatives A-E,
      reasoning_steps e final_answer em JSON. Não repita campos nem explique fora do JSON.
  question_evolution_success_judge:
    version: question_evolution_success_v1
    system: >-
      Avalie se a questão evoluída cumpre a estratégia solicitada sem perder coerência,
      solucionabilidade, qualidade das alternativas ou relação justificável com a entrada.
    user: |-
      Estratégia: {strategy}
      Objetivo: {objective}
      Questão de entrada:
      {input_question}
      CoT de entrada:
      {initial_cot}
      Questão evoluída:
      {evolved_question}
      CoT evoluído:
      {evolved_cot}
      Retorne approved (booleano) e reasons (lista de strings).
  evolution_success_judge:
    version: evolution_success_v1
    system: >-
      Compare duas cadeias de raciocínio. Aprove apenas se a segunda for mais completa,
      específica, coerente e sem conteúdo irrelevante.
    user: |-
      Questão:
      {question}
      Inicial:
      {initial_cot}
      Aprimorada:
      {improved_cot}
      Retorne approved (booleano) e reasons (lista de strings).
  correctness_judge:
    version: correctness_v1
    system: >-
      Avalie consistência lógica, cálculos, conclusão e correspondência da alternativa.
      Retorne uma decisão conservadora em JSON.
    user: |-
      Questão:
      {question}
      Gabarito para validação: {gold_answer}
      Raciocínio:
      {reasoning}
      Retorne approved (booleano) e reasons (lista de strings).
